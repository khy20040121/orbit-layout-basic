# 本地开发环境配置（local）
# 说明：
# - 默认启动会加载本文件（config/local.yml）
# - 可通过 APP_CONF 或启动参数 -conf 指定其他配置文件
#   示例：APP_CONF=config/prod.yml go run ./cmd/server
# - 字段用途：
#   - env：环境标识
#   - http.port：服务端口
#   - security.*：安全相关（按需接入）
#   - data.*：外部依赖（按需接入）
#   - log.*：日志级别/格式/滚动等
env: local
http:
  port: 8000
security:
  api_sign:
    app_key: 123456
    app_security: 123456
  jwt:
    key: 1234
data:
  mysql:
    user: root:1@tcp(127.0.0.1:3306)/user?charset=utf8mb4&parseTime=True&loc=Local
  redis:
    addr: 127.0.0.1:6350
    password: ""
    db: 0
    read_timeout: 0.2s
    write_timeout: 0.2s

log:
  log_level: debug
  encoding: console           # json or console
  log_file_name: "./storage/logs/server.log"
  max_backups: 30              # 日志文件最多保存多少个备份
  max_age: 7                   #  文件最多保存多少天
  max_size: 1024               #  每个日志文件保存的最大尺寸 单位：M
  compress: true               # 是否压缩